<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindCloud — AI Mind Mapper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07071a;
      --text: #dde0f5;
      --muted: #52527a;
      --border: rgba(255,255,255,0.07);
      --surface: rgba(255,255,255,0.04);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97) translateY(8px);
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: all 0.4s ease;
    }

    #ui-layer {
      position: relative;
      z-index: 100;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* STATE 1: INITIAL CENTERED LOAD */
    #app.state-initial #ui-layer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 1.6rem;
    }

    #app.state-initial #canvas-layer {
      display: none; /* Hide canvas entirely on load */
    }

    #app.state-initial .input-row {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    #app.state-initial #words-input {
      min-height: 148px;
    }

    /* STATE 2: MAPPED (MOVED TO TOP) */
    #app.state-mapped #ui-layer {
      flex: 0 0 auto;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.4rem;
      background: rgba(7,7,26,0.65);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #app.state-mapped .logo { font-size: 1.2rem; }
    #app.state-mapped .tagline, #app.state-mapped .field-label { display: none; }
    #app.state-mapped .input-card {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      max-width: 600px;
      flex: 1;
      margin-left: 2rem;
    }

    #app.state-mapped .input-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0.8rem;
    }

    #app.state-mapped #words-input {
      min-height: 42px;
      height: 42px;
      white-space: nowrap;
      overflow: hidden;
      resize: none;
      padding: 0.6rem 1rem;
    }

    #app.state-mapped #map-btn {
      margin-top: 0;
      width: auto;
      padding: 0.6rem 1.2rem;
      white-space: nowrap;
      font-size: 0.85rem;
    }

    /* ── CANVAS LAYER ── */
    #canvas-layer {
      flex: 1;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    #canvas-layer::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    #words-input {
      width: 100%;
      min-height: 148px;
      background: rgba(255,255,255,0.028);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 0.9rem 1rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.8;
      resize: vertical;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    #words-input:focus {
      border-color: rgba(124,108,252,0.45);
      box-shadow: 0 0 0 3px rgba(124,108,252,0.1);
    }
    #words-input::placeholder { color: #3a3a60; }

    #error-msg {
      display: none;
      margin-top: 0.5rem;
      color: #ff8fa3;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
    }
    #error-msg.show { display: block; }

    #map-btn {
      margin-top: 0.9rem;
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(130deg, #7c6cfc 0%, #4fd1c5 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    #map-btn:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(124,108,252,0.4);
    }
    #map-btn:active:not(:disabled) { transform: translateY(0); }
    #map-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.9;
      text-align: center;
      max-width: 420px;
      letter-spacing: 0.01em;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(7,7,26,0.88);
      backdrop-filter: blur(16px);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
    }
    #loading.show { display: flex; }

    .orbit {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #7c6cfc;
      border-right-color: rgba(124,108,252,0.3);
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── CANVAS SCREEN ── */
    #canvas-screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
    }

    #canvas-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    #canvas-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 45% 38% at 15% 15%, rgba(108,92,231,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 38% 45% at 88% 85%, rgba(79,209,197,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.4rem;
      background: rgba(7,7,26,0.65);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 100;
    }

    .topbar-logo {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(130deg, #e0deff, #7c6cfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-hint {
      font-size: 0.66rem;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-align: center;
    }
    .topbar-hint span { display: inline-block; margin: 0 0.6rem; }
    .topbar-hint .sep { color: #2a2a48; }

    #reset-btn {
      padding: 0.38rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }
    #reset-btn:hover {
      background: rgba(255,255,255,0.09);
      color: var(--text);
      border-color: rgba(255,255,255,0.14);
    }

    #svg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      overflow: visible;
    }

    #clouds-container {
      position: absolute;
      inset: 0;
      z-index: 20;
    }

    /* ── CLOUD NODE ── */
    .cloud-node {
      position: absolute;
      min-width: 180px;
      max-width: 248px;
      padding: 1.1rem 1.3rem 1.4rem;
      cursor: grab;
      transition: box-shadow 0.3s, filter 0.25s;
      animation: cloudPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cloudPop {
      from { opacity: 0; transform: scale(0.25) translateY(30px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);     }
    }

    .cloud-node.is-dragging {
      cursor: grabbing !important;
      animation: none !important;
      z-index: 80 !important;
      transition: box-shadow 0.15s;
    }

    .cloud-node.is-dim    { filter: brightness(0.38) saturate(0.3); }
    .cloud-node.is-target { z-index: 70; filter: brightness(1.15); }

    .cloud-x {
      position: absolute;
      top: 7px; right: 7px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(255,80,80,0.12);
      border: 1px solid rgba(255,80,80,0.28);
      color: rgba(255,130,130,0.8);
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      z-index: 5;
    }
    .cloud-node:hover .cloud-x { opacity: 1; }
    .cloud-x:hover { background: rgba(255,80,80,0.28); color: #fff; }

    .cloud-header {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding-bottom: 0.6rem;
      margin-bottom: 0.65rem;
    }

    .cloud-emoji { font-size: 1.1rem; line-height: 1; }

    .cloud-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .cloud-words {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .word-pill {
      padding: 0.2rem 0.55rem;
      border-radius: 30px;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      background: rgba(255,255,255,0.065);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--text);
      line-height: 1.5;
      white-space: nowrap;
    }

    .connect-handle {
      position: absolute;
      bottom: 9px; right: 9px;
      width: 17px; height: 17px;
      border-radius: 50%;
      border: 2px solid currentColor;
      background: rgba(7,7,26,0.85);
      cursor: crosshair;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      z-index: 6;
    }
    .connect-handle::after {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }
    .cloud-node:hover .connect-handle { opacity: 1; }
    .connect-handle:hover {
      transform: scale(1.4);
      box-shadow: 0 0 10px currentColor;
    }

    .conn-mid-btn {
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(7,7,26,0.92);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,130,130,0.8);
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 40;
      transition: opacity 0.2s, transform 0.2s, border-color 0.2s;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.7);
    }
    .conn-mid-btn:hover {
      opacity: 1 !important;
      transform: translate(-50%, -50%) scale(1.15);
      border-color: rgba(255,100,100,0.6);
      background: rgba(255,60,60,0.2);
    }
    #clouds-container:hover .conn-mid-btn { opacity: 0.55; }
    .subcat-block {
      margin-bottom: 0.55rem;
    }

    .subcat-title {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.25rem;
    }

    .subcat-words {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
  </style>
</head>
<body>

<div id="app" class="state-initial">

  <div id="ui-layer">
    <div class="logo-wrap">
      <span class="logo">MindCloud</span>
      <div class="tagline">AI-Powered Mind Mapping</div>
    </div>

    <div class="input-card">
      <label class="field-label" for="words-input">Your words &amp; ideas</label>
      <div class="input-row">
          <textarea
                  id="words-input"
                  placeholder="e.g. Machine Learning, Meditation, Python, Coffee, Sleep..."
                  spellcheck="false"
          ></textarea>
        <button id="map-btn" onclick="handleMap()">Map My Mind →</button>
      </div>
      <div id="error-msg">Please enter at least 3 words or phrases.</div>
    </div>
  </div>

  <div id="canvas-layer">
    <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="clouds-container"></div>
  </div>

</div>

<div id="loading">
  <div class="orbit"></div>
  <div class="loading-label">AI is mapping your mind…</div>
</div>

  <script>
  // ══════════════════════════════════════════════════════════════
  //  PALETTE
  // ══════════════════════════════════════════════════════════════
  const PALETTE = [
    { color:'#7c6cfc', bg:'rgba(124,108,252,0.11)', border:'rgba(124,108,252,0.28)' },
    { color:'#4fd1c5', bg:'rgba(79,209,197,0.1)',   border:'rgba(79,209,197,0.26)'  },
    { color:'#ff8a80', bg:'rgba(255,138,128,0.1)',  border:'rgba(255,138,128,0.26)' },
    { color:'#ffd166', bg:'rgba(255,209,102,0.1)',  border:'rgba(255,209,102,0.26)' },
    { color:'#a29bfe', bg:'rgba(162,155,254,0.1)',  border:'rgba(162,155,254,0.26)' },
    { color:'#55efc4', bg:'rgba(85,239,196,0.1)',   border:'rgba(85,239,196,0.26)'  },
    { color:'#fd79a8', bg:'rgba(253,121,168,0.1)',  border:'rgba(253,121,168,0.26)' },
    { color:'#fdcb6e', bg:'rgba(253,203,110,0.1)',  border:'rgba(253,203,110,0.26)' },
  ];

  // ══════════════════════════════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════════════════════════════
  let clouds      = [];
  let connections = [];
  let dragging    = null;
  let connecting  = null;
  let uid         = 0;

  const genId = (prefix) => `${prefix}_${uid++}`;

  // ══════════════════════════════════════════════════════════════
  //  INPUT HANDLER
  // ══════════════════════════════════════════════════════════════
  async function handleMap() {
    const raw   = document.getElementById('words-input').value;
    const words = raw.split(/[,\n]+/).map(w => w.trim()).filter(Boolean);
    const errEl = document.getElementById('error-msg');

    if (words.length < 3) {
      errEl.textContent = 'Please enter at least 3 words or phrases to map.';
      errEl.classList.add('show');
      return;
    }

    errEl.classList.remove('show');
    document.getElementById('map-btn').disabled = true;
    setLoading(true);

    try {
      const cats = await categorize(words);
      buildScene(cats);
      document.getElementById('app').className = 'state-mapped';
      resetApp()
      document.getElementById('map-btn').textContent = "Update Map ↺"; // Change button text
    } catch (err) {
      console.error(err);
      errEl.textContent = 'Error: ' + err.message;
      errEl.classList.add('show');
    } finally {
      setLoading(false);
      document.getElementById('map-btn').disabled = false;
    }
  }

  // ══════════════════════════════════════════════════════════════
  //  CATEGORIZE — calls our own Vercel serverless proxy
  //  No API key here. Key lives only in Vercel environment vars.
  // ══════════════════════════════════════════════════════════════
  async function categorize(words) {
    const res = await fetch('/api/categorize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const data = await res.json();

    // 🔥 NEW: transform hierarchical → flat clouds
    return transformTreeToClouds(data);
  }


  function transformTreeToClouds(tree) {
    return (tree.children || []).map(cat => ({
      id: genId('c'),
      category: cat.name,
      emoji: cat.emoji,
      subcategories: (cat.children || []).map(sub => ({
        name: sub.name,
        words: (sub.children || []).map(w => w.name)
      }))
    }));
  }
  // ══════════════════════════════════════════════════════════════
  //  BUILD SCENE
  // ══════════════════════════════════════════════════════════════
  function buildScene(cats) {
    clouds      = [];
    connections = [];
    uid         = 0;

    const W   = window.innerWidth;
    const H   = window.innerHeight;
    const TOP = 20;
    const PAD = 30;
    const CW  = 150;
    const CH  = 170;
    const maxDY = 15;
    const cellW = 150;   // approximate cell width
    const cols = Math.floor((W - PAD * 2) / cellW);
    const rows = Math.ceil(cats.length / cols);
    const cellH = (H - TOP - PAD * 2) / rows;

    cats.forEach((cat, i) => {
      const p = PALETTE[i % PALETTE.length];
      const col = i % cols;
      const row = Math.floor(i / cols);

      const x = PAD + col * cellW + Math.random() * 20;      // small random X offset
      const y = TOP + PAD + row * cellH + Math.random() * maxDY;

      const rr = () => Math.floor(Math.random() * 22 + 42);
      const borderRadius = `${rr()}% ${rr()}% ${rr()}% ${rr()}% / ${rr()}% ${rr()}% ${rr()}% ${rr()}%`;
      clouds.push({
        id: cat.id,
        category: cat.category,
        emoji: cat.emoji,
        subcategories: cat.subcategories, // keep subcategories here
        x: Math.min(x, W - 100), // ensure cloud fits in width
        y: Math.min(y, H - 60),  // ensure cloud fits in height
        width: 120,
        height: 50,
        color:  p.color,
        bg:     p.bg,
        border: p.border,
        borderRadius,
        delay:  i * 0.07,
        el: null,
      });
    });

    renderScene();
  }

  // ══════════════════════════════════════════════════════════════
  //  RENDER
  // ══════════════════════════════════════════════════════════════
  function renderScene() {
    renderClouds();
    renderConnections();
  }

  function renderClouds() {
    const container = document.getElementById('clouds-container');
    container.querySelectorAll('.cloud-node').forEach(el => el.remove());
    clouds.forEach(cloud => {
      const el = makeCloudEl(cloud);
      container.appendChild(el);
      cloud.el = el;
    });
  }

  function makeCloudEl(cloud) {
    const el = document.createElement('div');
    el.className = 'cloud-node';
    el.id = cloud.id;
    el.setAttribute('data-cloud-id', cloud.id);
    el.style.cssText = `
      left: ${cloud.x}px;
      top:  ${cloud.y}px;
      width: ${cloud.width}px;
      background: ${cloud.bg};
      border: 1.5px solid ${cloud.border};
      border-radius: ${cloud.borderRadius};
      box-shadow: 0 6px 36px ${cloud.bg.replace('0.1','0.2')}, 0 1px 0 rgba(255,255,255,0.05) inset;
      color: ${cloud.color};
      animation-delay: ${cloud.delay}s;
    `;

    const hdivider = `border-bottom: 1px solid ${cloud.border};`;

    el.innerHTML = `
      <div class="cloud-x" onclick="deleteCloud('${cloud.id}')">✕</div>
      <div class="cloud-header" style="${hdivider}">
        <span class="cloud-emoji">${cloud.emoji}</span>
        <span class="cloud-title" style="color:${cloud.color}">${escHtml(cloud.category)}</span>
      </div>
      <div class="cloud-words">
  ${(cloud.subcategories || []).map(sub => `
  <div class="subcat-block">
    <div class="subcat-title">${escHtml(sub.name)}</div>
    <div class="subcat-words">
      ${sub.words.map(w => `<span class="word-pill">${escHtml(w)}</span>`).join('')}
    </div>
  </div>
`).join('')}
</div>
      <div class="connect-handle"
           style="color:${cloud.color};"
           data-handle-for="${cloud.id}"></div>
    `;

    el.addEventListener('mousedown', onCloudBodyDown);
    el.querySelector('.connect-handle').addEventListener('mousedown', onHandleDown);
    return el;
  }

  function renderConnections() {
    const svg       = document.getElementById('svg-layer');
    const container = document.getElementById('clouds-container');

    svg.querySelectorAll('.conn-group').forEach(g => g.remove());
    container.querySelectorAll('.conn-mid-btn').forEach(b => b.remove());
    const tempLine = svg.querySelector('.temp-line');

    connections.forEach(conn => {
      const from = clouds.find(c => c.id === conn.fromId);
      const to   = clouds.find(c => c.id === conn.toId);
      if (!from || !to) return;

      const pts = lineEndpoints(from, to);
      const d = bezierPath(
              pts.x1, pts.y1,
              pts.x2, pts.y2,
              pts.fromSide,
              pts.toSide
      );
      const gid = `grad_${conn.id}`;

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.className.baseVal = 'conn-group';
      g.innerHTML = `
        <defs>
          <linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="${from.color}" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="${to.color}"   stop-opacity="0.85"/>
          </linearGradient>
        </defs>
        <path d="${d}" stroke="url(#${gid})" stroke-width="7"  fill="none" stroke-opacity="0.12"/>
        <path d="${d}" stroke="url(#${gid})" stroke-width="1.8" fill="none" stroke-linecap="round" style="filter:drop-shadow(0 0 5px ${from.color}88)"/>
      `;
      svg.insertBefore(g, tempLine);

      const mid = midpoint(pts.x1, pts.y1, pts.x2, pts.y2);
      const btn = document.createElement('button');
      btn.className = 'conn-mid-btn';
      btn.title = 'Remove connection';
      btn.textContent = '✕';
      btn.style.left = mid.x + 'px';
      btn.style.top  = mid.y + 'px';
      btn.addEventListener('click', () => deleteConnection(conn.id));
      container.appendChild(btn);
    });
  }

  function updateTempLine() {
    const svg = document.getElementById('svg-layer');
    let tl = svg.querySelector('.temp-line');
    if (!connecting) { if (tl) tl.remove(); return; }
    if (!tl) {
      tl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      tl.className.baseVal = 'temp-line';
      tl.setAttribute('fill', 'none');
      tl.setAttribute('stroke', 'rgba(255,255,255,0.35)');
      tl.setAttribute('stroke-width', '2');
      tl.setAttribute('stroke-dasharray', '6 4');
      tl.setAttribute('stroke-linecap', 'round');
      svg.appendChild(tl);
    }
    tl.setAttribute('d', bezierPath(connecting.x1, connecting.y1, connecting.x2, connecting.y2));
  }

  // ══════════════════════════════════════════════════════════════
  //  GEOMETRY
  // ══════════════════════════════════════════════════════════════
  function cloudRect(cloud) {
    if (cloud.el) return cloud.el.getBoundingClientRect();
    return { left: cloud.x, top: cloud.y, right: cloud.x + cloud.width, bottom: cloud.y + 180, width: cloud.width, height: 180 };
  }

  function lineEndpoints(from, to) {
    const fr = cloudRect(from);
    const tr = cloudRect(to);

    const c1 = {
      x: fr.left + fr.width / 2,
      y: fr.top + fr.height / 2
    };

    const c2 = {
      x: tr.left + tr.width / 2,
      y: tr.top + tr.height / 2
    };

    const dx = c2.x - c1.x;
    const dy = c2.y - c1.y;

    function getSnapPoint(rect, side) {
      switch (side) {
        case 'left':
          return { x: rect.left, y: rect.top + rect.height / 2 };
        case 'right':
          return { x: rect.left + rect.width, y: rect.top + rect.height / 2 };
        case 'top':
          return { x: rect.left + rect.width / 2, y: rect.top };
        case 'bottom':
          return { x: rect.left + rect.width / 2, y: rect.top + rect.height };
      }
    }

    let fromSide, toSide;

    // 🔥 Decide orientation
    if (Math.abs(dx) > Math.abs(dy)) {
      // Horizontal layout
      if (dx > 0) {
        fromSide = 'right';
        toSide   = 'left';
      } else {
        fromSide = 'left';
        toSide   = 'right';
      }
    } else {
      // Vertical layout
      if (dy > 0) {
        fromSide = 'bottom';
        toSide   = 'top';
      } else {
        fromSide = 'top';
        toSide   = 'bottom';
      }
    }

    const p1 = getSnapPoint(fr, fromSide);
    const p2 = getSnapPoint(tr, toSide);

    return {
      x1: p1.x,
      y1: p1.y,
      x2: p2.x,
      y2: p2.y,
      fromSide,
      toSide
    };
  }

  function bezierPath(x1, y1, x2, y2, fromSide, toSide) {
    const offset = 60;

    let cx1 = x1;
    let cy1 = y1;
    let cx2 = x2;
    let cy2 = y2;

    if (fromSide === 'right') cx1 += offset;
    if (fromSide === 'left')  cx1 -= offset;
    if (fromSide === 'top')   cy1 -= offset;
    if (fromSide === 'bottom')cy1 += offset;

    if (toSide === 'right') cx2 += offset;
    if (toSide === 'left')  cx2 -= offset;
    if (toSide === 'top')   cy2 -= offset;
    if (toSide === 'bottom')cy2 += offset;

    return `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`;
  }

  function midpoint(x1, y1, x2, y2) { return { x: (x1+x2)/2, y: (y1+y2)/2 }; }

  function hitCloud(e, excludeId) {
    return clouds.find(c => {
      if (c.id === excludeId || !c.el) return false;
      const r = c.el.getBoundingClientRect();
      return e.clientX >= r.left && e.clientX <= r.right
          && e.clientY >= r.top  && e.clientY <= r.bottom;
    });
  }

  // ══════════════════════════════════════════════════════════════
  //  MOUSE EVENTS
  // ══════════════════════════════════════════════════════════════
  function onCloudBodyDown(e) {
    const el = e.currentTarget;
    if (e.target.closest('.connect-handle') || e.target.closest('.cloud-x')) return;
    e.preventDefault();
    e.stopPropagation();
    const cloudId = el.getAttribute('data-cloud-id');
    const cloud   = clouds.find(c => c.id === cloudId);
    dragging = { cloudId, offsetX: e.clientX - cloud.x, offsetY: e.clientY - cloud.y };
    el.classList.add('is-dragging');
  }

  function onHandleDown(e) {
    e.preventDefault();
    e.stopPropagation();
    const cloudId = e.currentTarget.getAttribute('data-handle-for');
    const cloud   = clouds.find(c => c.id === cloudId);
    const r       = cloud.el.getBoundingClientRect();
    connecting = {
      fromId: cloudId,
      x1: r.left + r.width / 2, y1: r.top + r.height / 2,
      x2: e.clientX, y2: e.clientY,
    };
    clouds.forEach(c => { if (c.id !== cloudId && c.el) c.el.classList.add('is-dim'); });
  }

  let rafId = null;
  document.addEventListener('mousemove', e => {
    if (!dragging && !connecting) return;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => {
      if (dragging) {
        const cloud = clouds.find(c => c.id === dragging.cloudId);
        if (!cloud) return;
        cloud.x = e.clientX - dragging.offsetX;
        cloud.y = e.clientY - dragging.offsetY;
        cloud.el.style.left = cloud.x + 'px';
        cloud.el.style.top  = cloud.y + 'px';
        renderConnections();
      }
      if (connecting) {
        connecting.x2 = e.clientX;
        connecting.y2 = e.clientY;
        updateTempLine();
        const target = hitCloud(e, connecting.fromId);
        clouds.forEach(c => {
          if (c.id === connecting.fromId || !c.el) return;
          if (c === target) { c.el.classList.remove('is-dim'); c.el.classList.add('is-target'); }
          else              { c.el.classList.add('is-dim');    c.el.classList.remove('is-target'); }
        });
      }
    });
  });

  document.addEventListener('mouseup', e => {
    if (dragging) {
      const cloud = clouds.find(c => c.id === dragging.cloudId);
      if (cloud && cloud.el) cloud.el.classList.remove('is-dragging');
      dragging = null;
    }
    if (connecting) {
      const target = hitCloud(e, connecting.fromId);
      if (target) addConnection(connecting.fromId, target.id);
      connecting = null;
      updateTempLine();
      clouds.forEach(c => { if (c.el) c.el.classList.remove('is-dim', 'is-target'); });
      renderConnections();
    }
  });

  // ══════════════════════════════════════════════════════════════
  //  CONNECTION CRUD
  // ══════════════════════════════════════════════════════════════
  function addConnection(fromId, toId) {
    const dup = connections.some(c =>
      (c.fromId === fromId && c.toId === toId) ||
      (c.fromId === toId   && c.toId === fromId)
    );
    if (dup) return;
    connections.push({ id: genId('k'), fromId, toId });
    renderConnections();
  }

  function deleteConnection(connId) {
    connections = connections.filter(c => c.id !== connId);
    renderConnections();
  }

  function deleteCloud(cloudId) {
    clouds      = clouds.filter(c => c.id !== cloudId);
    connections = connections.filter(c => c.fromId !== cloudId && c.toId !== cloudId);
    renderScene();
  }

  // ══════════════════════════════════════════════════════════════
  //  UTILS
  // ══════════════════════════════════════════════════════════════
  function resetApp() {
    document.getElementById('app').className = 'state-initial';
    document.getElementById('map-btn').textContent = "Map My Mind →";
    document.getElementById('words-input').value = '';
    clouds = [];
    connections = [];
    document.getElementById('clouds-container').innerHTML = '';
    document.getElementById('svg-layer').innerHTML = '';
  }

  function setLoading(on) {
    document.getElementById('loading').classList.toggle('show', on);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('words-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.metaKey) handleMap();
  });
  </script>
</body>
</html>
